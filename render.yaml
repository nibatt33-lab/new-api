services:
  - type: web
    name: new-api
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /
    disk:
      name: new-api-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: PORT
        value: 3000
      - key: SQLITE_PATH
        value: /data/new-api.db
      - key: SESSION_SECRET
        generateValue: true
