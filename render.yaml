databases:
  - name: new-api-db
    plan: free

services:
  - type: web
    name: new-api
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 3000
      - key: SQL_DSN
        fromDatabase:
          name: new-api-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
